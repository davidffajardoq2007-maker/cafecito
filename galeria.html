<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galería - El mejor café</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="css/galeria.css">
</head>
<body>

    <header>
        <nav class="navbar">
            <a href="index.html" class="nav-logo">
                <h2 class="nav-text">☕ Coffee</h2>
            </a>
            <input type="checkbox" id="menu-toggle" class="menu-toggle">
            <ul class="nav-menu">
                <li class="nav-item"><a href="index.html" class="nav-link">Home</a></li>
                <li class="nav-item"><a href="menu.html" class="nav-link">Menu</a></li>
                <li class="nav-item"><a href="galeria.html" class="nav-link">Galeria</a></li>
                <li class="nav-item"><a href="contactenos.html" class="nav-link">Contactenos</a></li>
            </ul>
            <div class="nav-actions">
                <a href="login.html" class="nav-login" title="Iniciar sesion">
                    <i class="fa-regular fa-user"></i>
                </a>
                <label for="menu-toggle" class="hamburger">
                    <span></span>
                    <span></span>
                    <span></span>
                </label>
            </div>
        </nav>
    </header>

    <main class="main-gallery">
        <h1 class="main-title">GALLERY</h1>

        <div class="gallery-grid">
            <div class="gallery-item">
                <div class="orange-box">
                    <img src="img/gallery-1.jpg.jpeg" alt="Café">
                </div>
            </div>
            <div class="gallery-item">
                <div class="orange-box">
                    <img src="img/gallery-2.jpg.jpeg" alt="Comida">
                </div>
            </div>
            <div class="gallery-item">
                <div class="orange-box">
                    <img src="img/gallery-3.jpg.jpeg" alt="Batido">
                </div>
            </div>
            <div class="gallery-item">
                <div class="orange-box">
                    <img src="img/gallery-4.jpg.jpeg" alt="Plato">
                </div>
            </div>
            <div class="gallery-item">
                <div class="orange-box">
                    <img src="img/gallery-5.jpg.jpeg" alt="comida">
                </div>
            </div>
            <div class="gallery-item">
                <div class="orange-box">
                    <img src="img/gallery-6.jpg.jpeg" alt="Postre">
                </div>
            </div>
        </div>
    </main>

</body>
</html>
