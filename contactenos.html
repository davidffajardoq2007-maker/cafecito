<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contáctenos - El mejor café</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="css/contactenos.css">
</head>
<body>

    <header>
        <nav class="navbar">
            <a href="index.html" class="nav-logo">
                <h2 class="nav-text">☕ Coffee</h2>
            </a>
            <input type="checkbox" id="menu-toggle" class="menu-toggle">
            <ul class="nav-menu">
                <li class="nav-item"><a href="index.html" class="nav-link">Home</a></li>
                <li class="nav-item"><a href="menu.html" class="nav-link">Menu</a></li>
                <li class="nav-item"><a href="galeria.html" class="nav-link">Galeria</a></li>
                <li class="nav-item"><a href="contactenos.html" class="nav-link">Contactenos</a></li>
            </ul>
            <div class="nav-actions">
                <a href="login.html" class="nav-login" title="Iniciar sesion">
                    <i class="fa-regular fa-user"></i>
                </a>
                <label for="menu-toggle" class="hamburger">
                    <span></span>
                    <span></span>
                    <span></span>
                </label>
            </div>
        </nav>
    </header>

    <main class="main-contact">
        <div class="container-contact">
            
            <h1 class="main-title">CONTACTENOS</h1>

            <div class="contact-grid">
                
                <div class="contact-info">
                    <p><i class="fas fa-map-marker-alt"></i> 123 Camsite avenue, wilderness, CA 98765</p>
                    <p><i class="fas fa-envelope"></i> info@coffeeshopwebsite.com</p>
                    <p><i class="fas fa-phone-alt"></i> (123)4465-78909</p>
                    <p><i class="far fa-clock"></i> Monday-Friday: 9:00AM - 5:00PM</p>
                    <p><i class="far fa-clock"></i> Saturday: 10:00 AM - 3:00 PM</p>
                    <p><i class="far fa-clock"></i> Sunday: Closed</p>
                    <p><i class="fas fa-globe"></i> www.codingneplweb.com</p>
                </div>

                <form class="contact-form">
                    <input type="text" placeholder="Your name" required>
                    <input type="email" placeholder="Your email" required>
                    <textarea placeholder="Your message" rows="6" required></textarea>
                    <button type="submit" class="btn-submit">Enviar Mensaje</button>
                </form>

            </div>
        </div>
    </main>

</body>
</html>
