<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coffee Shop - Contáctenos</title>
    <link rel="stylesheet" href="css/contactenos.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <header class="header">
        <div class="container-header">
            <div class="logo">
                <i class="fas fa-coffee"></i> coffee
            </div>
            <nav class="nav">
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="#">Menú</a></li>
                    <li><a href="#">Galeria</a></li>
                    <li><a href="#" class="active">Contactenos</a></li>
                    <li><a href="#"><i class="fas fa-shopping-cart"></i></a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="main-contact">
        <div class="container-contact">
            
            <h1 class="contact-title">contactenos</h1>

            <div class="contact-grid">
                
                <div class="contact-info">
                    <p><i class="fas fa-map-marker-alt"></i> 123 Camsite avenue, wilderness, CA 98765</p>
                    <p><i class="fas fa-envelope"></i> info@coffeeshopwebsite.com</p>
                    <p><i class="fas fa-phone-alt"></i> (123)4465-78909</p>
                    <p><i class="far fa-clock"></i> Monday-Friday: 9:00AM - 5:PM</p>
                    <p><i class="far fa-clock"></i> Saturday: 10:00 AM - 3:00 PM</p>
                    <p><i class="far fa-clock"></i> Sunday: Closed</p>
                    <p><i class="fas fa-globe"></i> www.codingneplweb.com</p>
                </div>

                <form class="contact-form">
                    <input type="text" placeholder="Your name" required>
                    <input type="email" placeholder="Your email" required>
                    <textarea placeholder="Your message" rows="6" required></textarea>
                    <div class="empty-field"></div> 
                </form>

            </div>
        </div>
    </main>

</body>
</html>
